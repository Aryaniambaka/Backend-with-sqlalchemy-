services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./:/usr/src/app
    environment:
      - DB=postgresql://postgres:1234@postgres:5432/Fast.api project
      - SECRET_KEY=a
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir app
    depends_on:
      - postgres

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_PASSWORD=1234
      - POSTGRES_DB=Fast.api project
    volumes:
      - postgres-db:/var/lib/postgresql/data

volumes:
  postgres-db: